<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Background circle gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a5e1a"/>
      <stop offset="100%" stop-color="#0d3b0d"/>
    </radialGradient>
    <!-- Beer gradient -->
    <linearGradient id="beerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="60%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e68a00"/>
    </linearGradient>
    <!-- Foam gradient -->
    <radialGradient id="foamGrad" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </radialGradient>
    <!-- Golf ball texture -->
    <pattern id="dimples" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="rgba(0,0,0,0.06)"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- Glow for text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main circular badge background -->
  <circle cx="300" cy="300" r="280" fill="url(#bgGrad)" stroke="#c8a415" stroke-width="6"/>
  <circle cx="300" cy="300" r="262" fill="none" stroke="#c8a415" stroke-width="2" stroke-dasharray="4 6"/>
  <circle cx="300" cy="300" r="255" fill="none" stroke="rgba(200,164,21,0.3)" stroke-width="1"/>

  <!-- Crossed golf clubs behind the scene -->
  <g filter="url(#shadow)" opacity="0.9">
    <!-- Left club: DRIVER -->
    <g transform="translate(300,310) rotate(-35)">
      <!-- Shaft -->
      <rect x="-4" y="-180" width="8" height="240" rx="4" fill="#8d6e4a"/>
      <rect x="-2" y="-180" width="3" height="240" rx="2" fill="#a0825c"/>
      <!-- Grip at bottom -->
      <rect x="-5" y="30" width="10" height="35" rx="3" fill="#333"/>
      <rect x="-5" y="32" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="40" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="48" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="56" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <!-- Driver head: big rounded bulbous shape -->
      <g transform="translate(0,-188) rotate(-20)">
        <ellipse cx="-14" cy="0" rx="32" ry="22" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
        <ellipse cx="-14" cy="0" rx="28" ry="18" fill="#3a3a3a"/>
        <!-- Face line -->
        <ellipse cx="2" cy="0" rx="4" ry="16" fill="#555" opacity="0.6"/>
        <!-- Crown shine -->
        <ellipse cx="-18" cy="-8" rx="14" ry="5" fill="rgba(255,255,255,0.1)"/>
      </g>
    </g>
    <!-- Right club: PUTTER -->
    <g transform="translate(300,310) rotate(35)">
      <!-- Shaft (thinner for putter) -->
      <rect x="-3" y="-180" width="6" height="240" rx="3" fill="#b0b0b0"/>
      <rect x="-1" y="-180" width="2" height="240" rx="1" fill="#d0d0d0"/>
      <!-- Grip at bottom -->
      <rect x="-5" y="30" width="10" height="40" rx="3" fill="#333"/>
      <rect x="-5" y="33" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="41" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="49" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <rect x="-5" y="57" width="10" height="4" rx="1" fill="#555" opacity="0.5"/>
      <!-- Putter head: flat blade shape -->
      <g transform="translate(0,-186) rotate(20)">
        <!-- Blade putter: flat rectangular head -->
        <rect x="-30" y="-8" width="52" height="16" rx="3" fill="#888" stroke="#666" stroke-width="1.5"/>
        <rect x="-28" y="-6" width="48" height="12" rx="2" fill="#999"/>
        <!-- Face insert (darker strip) -->
        <rect x="14" y="-5" width="5" height="10" rx="1" fill="#666"/>
        <!-- Shine on putter -->
        <rect x="-24" y="-4" width="30" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
        <!-- Hosel connection -->
        <rect x="18" y="-4" width="8" height="8" rx="2" fill="#777"/>
      </g>
    </g>
  </g>


  <!-- "BEERS" text - top arc -->
  <path id="topArc" d="M100 300 A200 200 0 0 1 500 300" fill="none"/>
  <text font-family="'Georgia', serif" font-weight="bold" font-size="56" fill="#ffd54f" stroke="#8b6914" stroke-width="2" letter-spacing="6" filter="url(#glow)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">LARAVEL</textPath>
  </text>

  <!-- Subtitle banner (below beers & crossed clubs) -->
  <rect x="190" y="390" width="220" height="32" rx="16" fill="#c8a415"/>
  <rect x="192" y="392" width="216" height="28" rx="14" fill="#0d3b0d" stroke="#c8a415" stroke-width="1"/>
  <text x="300" y="412" font-family="'Georgia', serif" font-size="14" fill="#ffd54f" text-anchor="middle" letter-spacing="4">GOLF LEAGUE</text>

  <!-- "BOGIES" text - bottom arc -->
  <path id="bottomArc" d="M110 380 A200 200 0 0 0 490 380" fill="none"/>
  <text font-family="'Georgia', serif" font-weight="bold" font-size="66" fill="#ffd54f" stroke="#8b6914" stroke-width="2" letter-spacing="10" filter="url(#glow)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">GOLF</textPath>
  </text>

  <!-- Small decorative stars/sparkles -->
  <text x="140" y="300" font-size="16" fill="#ffd54f" opacity="0.6">✦</text>
  <text x="460" y="300" font-size="16" fill="#ffd54f" opacity="0.6">✦</text>
  <text x="205" y="413" font-size="14" fill="#ffd54f" opacity="0.8">⛳</text>
  <text x="374" y="413" font-size="14" fill="#ffd54f" opacity="0.8">⛳</text>

  <!-- Tiny flag on golf ball -->
  <line x1="300" y1="238" x2="300" y2="215" stroke="#333" stroke-width="1.5"/>
  <polygon points="300,215 320,222 300,229" fill="#e53935"/>
</svg>